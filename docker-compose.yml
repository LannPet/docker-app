services:
  database:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aRsdCc44nVzF5@%
      POSTGRES_DB: grocery
      PORT: 3000
    volumes:
      - groceryData:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - database
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: aRsdCc44nVzF5@%
      DB_NAME: grocery
      DATABASE_URL: postgresql://postgres:aRsdCc44nVzF5@%@database:5432/grocery

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    environment:
       - VITE_API_URL=http://localhost:3000

volumes:
  groceryData:






